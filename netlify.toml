# Netlify Configuration for SFT — Samsung Firmware Tool
# Static site deployment

[build]
  command = "echo 'SFT v2.5.1 — Static build complete'"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Redirect API calls to function (for future use)
[[redirects]]
  from = "/api/*"
  to = "/netlify/functions/flask/:splat"
  status = 200
